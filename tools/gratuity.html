<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gratuity Calculator | WorkMate India</title>

    <meta name="description"
        content="Free Gratuity Calculator for Indian employees. Calculate gratuity amount instantly.">

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
</head>

<body>

    <header>

        <div class="logo">
            <img src="../assets/logo.png" alt="WorkMate India">
        </div>

        <p>Smart Tools for Every Indian Employee</p>

    </header>

    <section class="tools">

        <div class="card">

            <h2>Gratuity Calculator</h2>

            <input type="number" id="basicSalary" placeholder="Last Drawn Basic Salary">

            <input type="number" id="years" placeholder="Years of Service">

            <button id="calculateGratuity">
                Calculate Gratuity
            </button>

        </div>

        <div class="card">

            <h2>Result</h2>

            <div id="gratuityResult">

                No calculation yet.

            </div>

            <div class="action-buttons">

                <a href="../index.html">
                    <button>← Back to Home</button>
                </a>

            </div>

        </div>

    </section>

    <footer>

        <p>© 2026 WorkMate India</p>

    </footer>

    <script src="../js/utils.js"></script>
    <script src="../js/gratuity.js"></script>

</body>

</html>
