<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>

        Salary Calculator | WorkMate India

    </title>

    <meta name="description" content="Free Salary Calculator for Indian Employees.">

    <link rel="icon" href="../assets/favicon.png">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../style.css">

    <!-- Google Analytics -->

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-10MCYLHTVH"></script>

    <script>

        window.dataLayer = window.dataLayer || [];

        function gtag() { dataLayer.push(arguments); }

        gtag('js', new Date());

        gtag('config', 'G-10MCYLHTVH');

    </script>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow sticky-top">

        <div class="container">

            <a class="navbar-brand fw-bold" href="../index.html">

                <img src="../assets/logo.png" width="45" class="me-2">

                WorkMate India

            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link" href="../index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="../faq.html">

                            FAQ

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="../contact.html">

                            Contact

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Hero -->

    <section class="hero py-5">

        <div class="container text-center">

            <h1 class="fw-bold">

                💰 Salary Calculator

            </h1>

            <p class="lead text-muted">

                Calculate your monthly in-hand salary instantly.

            </p>

        </div>

    </section>

    <div class="container py-5">

        <div class="row g-4">

            <!-- Input Card -->

            <div class="col-lg-6">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-body p-4">

                        <h3 class="mb-4">

                            Enter Salary Details

                        </h3>
                        <!-- Gross Salary -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">

                                Gross Salary

                            </label>

                            <input type="number" class="form-control form-control-lg" id="grossSalary"
                                placeholder="Enter Gross Salary">

                        </div>

                        <!-- Basic Salary -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">

                                Basic Salary

                            </label>

                            <input type="number" class="form-control form-control-lg" id="basicSalary"
                                placeholder="Leave empty for Auto (50%)">

                        </div>

                        <!-- Bonus -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">

                                Bonus

                            </label>

                            <input type="number" class="form-control form-control-lg" id="bonus"
                                placeholder="Bonus (Optional)">

                        </div>

                        <!-- PF -->

                        <div class="form-check mb-3">

                            <input class="form-check-input" type="checkbox" id="pf">

                            <label class="form-check-label" for="pf">

                                Calculate PF (12%)

                            </label>

                        </div>

                        <!-- ESI -->

                        <div class="form-check mb-4">

                            <input class="form-check-input" type="checkbox" id="esi">

                            <label class="form-check-label" for="esi">

                                Calculate ESI (0.75%)

                            </label>

                        </div>

                        <div class="d-grid">

                            <button id="calculateBtn" class="btn btn-primary btn-lg">

                                <i class="fa-solid fa-calculator"></i>

                                Calculate Salary

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Result -->

            <div class="col-lg-6">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-body p-4">

                        <h3 class="mb-4">

                            Salary Summary

                        </h3>

                        <div id="result">

                            <div class="alert alert-info">

                                No calculation yet.

                            </div>

                        </div>

                        <div class="d-grid gap-3 mt-4">

                            <button id="downloadPdf" class="btn btn-success btn-lg">

                                <i class="fa-solid fa-file-pdf"></i>

                                Download PDF

                            </button>

                            <a href="../index.html" class="btn btn-outline-primary btn-lg">

                                <i class="fa-solid fa-arrow-left"></i>

                                Back to Home

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
    <!-- Footer -->

    <footer class="bg-dark text-white py-4 mt-5">

        <div class="container text-center">

            <p class="mb-2">

                © 2026 WorkMate India

            </p>

            <div>

                <a href="../about.html" class="text-white text-decoration-none me-3">

                    About

                </a>

                <a href="../contact.html" class="text-white text-decoration-none me-3">

                    Contact

                </a>

                <a href="../privacy.html" class="text-white text-decoration-none me-3">

                    Privacy

                </a>

                <a href="../terms.html" class="text-white text-decoration-none me-3">

                    Terms

                </a>

                <a href="../faq.html" class="text-white text-decoration-none me-3">

                    FAQ

                </a>

                <a href="../disclaimer.html" class="text-white text-decoration-none">

                    Disclaimer

                </a>

            </div>

            <p class="mt-3 text-secondary">

                Made with ❤️ in India

            </p>

        </div>

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jsPDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Salary JS -->

    <script src="../js/salary.js"></script>

</body>

</html>
